 
<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyanOS Smart Workspace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { background-color: #111827; color: #f3f4f6; }
        .app-icon { transition: transform 0.2s; }
        .app-icon:hover { transform: scale(1.1); }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <!-- Header -->
    <header class="p-4 bg-gray-800 shadow-lg flex justify-between items-center border-b border-gray-700">
        <h1 class="text-lg font-bold text-blue-400">
            <i class="fas fa-robot mr-2"></i>MyanOS Workspace
        </h1>
        <span id="status" class="text-xs bg-green-600 px-2 py-1 rounded-full">System Ready</span>
    </header>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col p-4 gap-4 overflow-auto">
        
        <!-- Command Center -->
        <div class="bg-gray-800 rounded-xl p-4 shadow-xl">
            <label class="text-sm text-gray-400 mb-2 block">What do you want to build? (Command)</label>
            <div class="flex gap-2">
                <input type="text" id="commandInput" 
                    class="flex-1 bg-gray-700 border border-gray-600 rounded-lg p-3 text-white focus:outline-none focus:border-blue-500" 
                    placeholder="e.g., 'calculator' or 'clock' or 'notepad'">
                <button onclick="executeCommand()" class="bg-blue-600 hover:bg-blue-700 px-6 rounded-lg font-bold">
                    <i class="fas fa-play"></i>
                </button>
            </div>
            <div class="mt-3 flex flex-wrap gap-2">
                <span onclick="setCommand('calculator')" class="text-xs bg-gray-700 px-2 py-1 rounded cursor-pointer hover:bg-gray-600">Calculator</span>
                <span onclick="setCommand('clock')" class="text-xs bg-gray-700 px-2 py-1 rounded cursor-pointer hover:bg-gray-600">Clock</span>
                <span onclick="setCommand('notepad')" class="text-xs bg-gray-700 px-2 py-1 rounded cursor-pointer hover:bg-gray-600">Notepad</span>
                <span onclick="setCommand('todo list')" class="text-xs bg-gray-700 px-2 py-1 rounded cursor-pointer hover:bg-gray-600">Todo List</span>
                <span onclick="setCommand('drawing pad')" class="text-xs bg-gray-700 px-2 py-1 rounded cursor-pointer hover:bg-gray-600">Drawing Pad</span>
            </div>
        </div>

        <!-- Workspace Display Area -->
        <div class="flex-1 bg-gray-800 rounded-xl overflow-hidden shadow-xl border border-gray-700 relative">
            <div class="absolute top-0 left-0 right-0 bg-gray-900 p-2 flex items-center gap-2 text-gray-400 text-xs border-b border-gray-700">
                <div class="w-2 h-2 rounded-full bg-green-500"></div>
                <span id="windowTitle">Live Preview</span>
            </div>
            <iframe id="workspaceFrame" class="w-full h-full border-none mt-8 bg-white"></iframe>
        </div>

    </main>

    <!-- Logic Script -->
    <script>
        const templates = {
            // ဂဏန်းတွက်စက် Template
            'calculator': `
                <div class="p-4 bg-gray-100 min-h-screen flex items-center justify-center">
                    <div class="bg-white p-4 rounded shadow-lg w-64">
                        <input type="text" id="display" class="w-full p-2 text-right text-2xl border mb-2 rounded" readonly>
                        <div class="grid grid-cols-4 gap-2">
                            <button onclick="clearDisplay()" class="p-2 bg-red-500 text-white rounded col-span-2">C</button>
                            <button onclick="appendToDisplay('/')" class="p-2 bg-gray-300 rounded">/</button>
                            <button onclick="appendToDisplay('*')" class="p-2 bg-gray-300 rounded">*</button>
                            <button onclick="appendToDisplay('7')" class="p-2 bg-white border rounded">7</button>
                            <button onclick="appendToDisplay('8')" class="p-2 bg-white border rounded">8</button>
                            <button onclick="appendToDisplay('9')" class="p-2 bg-white border rounded">9</button>
                            <button onclick="appendToDisplay('-')" class="p-2 bg-gray-300 rounded">-</button>
                            <button onclick="appendToDisplay('4')" class="p-2 bg-white border rounded">4</button>
                            <button onclick="appendToDisplay('5')" class="p-2 bg-white border rounded">5</button>
                            <button onclick="appendToDisplay('6')" class="p-2 bg-white border rounded">6</button>
                            <button onclick="appendToDisplay('+')" class="p-2 bg-gray-300 rounded">+</button>
                            <button onclick="appendToDisplay('1')" class="p-2 bg-white border rounded">1</button>
                            <button onclick="appendToDisplay('2')" class="p-2 bg-white border rounded">2</button>
                            <button onclick="appendToDisplay('3')" class="p-2 bg-white border rounded">3</button>
                            <button onclick="calculate()" class="p-2 bg-blue-500 text-white rounded row-span-2">=</button>
                            <button onclick="appendToDisplay('0')" class="p-2 bg-white border rounded col-span-2">0</button>
                            <button onclick="appendToDisplay('.')" class="p-2 bg-white border rounded">.</button>
                        </div>
                    </div>
                    <script>
                        function appendToDisplay(value) { document.getElementById('display').value += value; }
                        function clearDisplay() { document.getElementById('display').value = ''; }
                        function calculate() { try { document.getElementById('display').value = eval(document.getElementById('display').value); } catch(e) { alert('Error'); } }
                    <\/script>
                </div>
            `,
            // နာရီ Template
            'clock': `
                <div class="p-4 bg-gray-900 min-h-screen flex flex-col items-center justify-center text-white">
                    <h1 class="text-xl mb-4">Current Time</h1>
                    <div id="clock" class="text-6xl font-mono bg-gray-800 p-6 rounded-lg shadow-lg border border-blue-500"></div>
                    <p class="mt-4 text-gray-400">MyanOS System Time</p>
                </div>
                <script>
                    function updateTime() {
                        const now = new Date();
                        document.getElementById('clock').innerText = now.toLocaleTimeString();
                    }
                    setInterval(updateTime, 1000);
                    updateTime();
                <\/script>
            `,
            // မှတ်စုစာအုပ် Template
            'notepad': `
                <div class="p-4 bg-yellow-50 min-h-screen">
                    <div class="max-w-lg mx-auto">
                        <h1 class="text-xl font-bold text-gray-800 mb-2">📝 Notepad</h1>
                        <textarea id="noteArea" class="w-full h-96 p-4 border rounded shadow-inner focus:outline-none" placeholder="Write your notes here..." oninput="saveNote()"></textarea>
                        <p class="text-xs text-gray-500 mt-2">* Auto-saves to your browser</p>
                    </div>
                </div>
                <script>
                    document.getElementById('noteArea').value = localStorage.getItem('myNote') || '';
                    function saveNote() { localStorage.setItem('myNote', document.getElementById('noteArea').value); }
                <\/script>
            `,
            // Todo List Template
            'todo list': `
                <div class="p-4 bg-white min-h-screen">
                    <div class="max-w-md mx-auto">
                        <h1 class="text-xl font-bold mb-4">✅ Todo List</h1>
                        <div class="flex gap-2 mb-4">
                            <input type="text" id="todoInput" class="flex-1 p-2 border rounded" placeholder="New Task">
                            <button onclick="addTodo()" class="bg-blue-500 text-white px-4 rounded">Add</button>
                        </div>
                        <ul id="todoList" class="space-y-2"></ul>
                    </div>
                </div>
                <script>
                    let todos = JSON.parse(localStorage.getItem('todos')) || [];
                    function render() {
                        const list = document.getElementById('todoList');
                        list.innerHTML = '';
                        todos.forEach((todo, i) => {
                            list.innerHTML += '<li class="flex justify-between items-center p-2 bg-gray-100 rounded"><span>' + todo + '</span><button onclick="removeTodo(' + i + ')" class="text-red-500">X</button></li>';
                        });
                    }
                    function addTodo() { 
                        const input = document.getElementById('todoInput');
                        if(input.value) { todos.push(input.value); localStorage.setItem('todos', JSON.stringify(todos)); input.value = ''; render(); } 
                    }
                    function removeTodo(i) { todos.splice(i, 1); localStorage.setItem('todos', JSON.stringify(todos)); render(); }
                    render();
                <\/script>
            `,
            // ရောင်စုံကားချပ် Template
            'drawing pad': `
                <div class="p-4 bg-gray-200 min-h-screen flex flex-col items-center">
                    <h1 class="mb-2 text-gray-700">Touch or Click to Draw</h1>
                    <canvas id="canvas" class="bg-white rounded shadow-lg border cursor-crosshair" width="350" height="500"></canvas>
                    <button onclick="clearCanvas()" class="mt-2 bg-red-500 text-white px-4 py-1 rounded">Clear</button>
                </div>
                <script>
                    const canvas = document.getElementById('canvas');
                    const ctx = canvas.getContext('2d');
                    let drawing = false;
                    ctx.strokeStyle = '#000';
                    ctx.lineWidth = 3;
                    ctx.lineCap = 'round';
                    
                    canvas.addEventListener('mousedown', () => drawing = true);
                    canvas.addEventListener('mouseup', () => drawing = false);
                    canvas.addEventListener('mousemove', draw);
                    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); drawing = true; });
                    canvas.addEventListener('touchend', () => drawing = false);
                    canvas.addEventListener('touchmove', (e) => { e.preventDefault(); draw(e.touches[0]); });

                    function draw(e) {
                        if (!drawing) return;
                        const rect = canvas.getBoundingClientRect();
                        const x = (e.clientX || e.pageX) - rect.left;
                        const y = (e.clientY || e.pageY) - rect.top;
                        ctx.lineTo(x, y);
                        ctx.stroke();
                    }
                    function clearCanvas() { ctx.clearRect(0, 0, canvas.width, canvas.height); }
                <\/script>
            `
        };

        function setCommand(cmd) {
            document.getElementById('commandInput').value = cmd;
            executeCommand();
        }

        function executeCommand() {
            const input = document.getElementById('commandInput').value.toLowerCase().trim();
            const frame = document.getElementById('workspaceFrame');
            const title = document.getElementById('windowTitle');
            
            let found = false;
            
            // Check keywords
            for (let key in templates) {
                if (input.includes(key)) {
                    frame.srcdoc = templates[key];
                    title.innerText = key.charAt(0).toUpperCase() + key.slice(1) + " App";
                    found = true;
                    break;
                }
            }

            if (!found) {
                frame.srcdoc = `
                    <div class="p-10 text-center text-gray-500">
                        <h1 class="text-2xl mb-2">🤖 Command Not Found</h1>
                        <p>I can only build these right now:</p>
                        <ul class="mt-4 text-left inline-block">
                            <li>➡️ Calculator</li>
                            <li>➡️ Clock</li>
                            <li>➡️ Notepad</li>
                            <li>➡️ Todo List</li>
                            <li>➡️ Drawing Pad</li>
                        </ul>
                        <p class="mt-4 text-xs">Try typing one of the buttons above!</p>
                    </div>
                `;
                title.innerText = "Error";
            }
        }
    </script>
</body>
</html>
