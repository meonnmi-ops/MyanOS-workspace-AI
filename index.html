<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free AI Workspace (No Cost)</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loader { border-top-color: #3498db; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-900 text-white min-h-screen flex flex-col">

    <!-- Header -->
    <header class="p-4 bg-gray-800 shadow-md flex justify-between items-center">
        <h1 class="text-xl font-bold text-blue-400">🤖 My Free AI Workspace</h1>
        <span id="status" class="text-xs bg-yellow-500 text-black px-2 py-1 rounded">AI Loading...</span>
    </header>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col md:flex-row p-4 gap-4 overflow-hidden">
        
        <!-- Left Panel: Chat & Prompt -->
        <div class="md:w-1/3 bg-gray-800 rounded-lg p-4 flex flex-col">
            <h2 class="text-lg font-semibold mb-2">Instruction Panel</h2>
            <p class="text-xs text-gray-400 mb-4">Type what you want to build. (e.g., "Create a Calculator")</p>
            
            <textarea id="userPrompt" class="bg-gray-700 p-3 rounded h-40 resize-none focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Enter your request here..."></textarea>
            
            <button id="runBtn" onclick="generateApp()" class="mt-4 bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded transition duration-300 disabled:opacity-50" disabled>
                Generate & Run (Free)
            </button>

            <div class="mt-4 text-xs text-gray-500">
                <p>Powered by WebLLM (Llama-3)</p>
                <p>Model runs locally on your device.</p>
            </div>
        </div>

        <!-- Right Panel: Workspace (Live Preview) -->
        <div class="md:w-2/3 bg-white rounded-lg overflow-hidden flex flex-col">
            <div class="bg-gray-200 p-2 flex items-center gap-2 text-gray-800">
                <div class="w-3 h-3 rounded-full bg-red-500"></div>
                <div class="w-3 h-3 rounded-full bg-yellow-500"></div>
                <div class="w-3 h-3 rounded-full bg-green-500"></div>
                <span class="ml-2 text-sm font-medium">Live Workspace Preview</span>
            </div>
            <iframe id="workspaceFrame" class="flex-1 bg-white w-full border-none"></iframe>
        </div>

    </main>

    <!-- WebLLM Library -->
    <script type="module">
        import * as webllm from "https://esm.run/@mlc-ai/web-llm";

        // Global variables
        let engine = null;
        const statusEl = document.getElementById("status");
        const runBtn = document.getElementById("runBtn");

        // Initialize AI Engine
        async function initAI() {
            try {
                statusEl.innerText = "Downloading AI Model (First time only)...";
                statusEl.className = "text-xs bg-orange-500 text-white px-2 py-1 rounded animate-pulse";
                
                // Using a small, efficient model suitable for browsers
                const selectedModel = "Llama-3-8B-Instruct-q4f16_1-MLC"; 
                
                engine = await webllm.CreateMLCEngine(selectedModel, {
                    initProgressCallback: (progress) => {
                        statusEl.innerText = `Loading: ${Math.round(progress.progress * 100)}%`;
                    }
                });

                statusEl.innerText = "AI Ready";
                statusEl.className = "text-xs bg-green-500 text-white px-2 py-1 rounded";
                runBtn.disabled = false;

            } catch (error) {
                console.error(error);
                statusEl.innerText = "Error Loading AI";
                statusEl.className = "text-xs bg-red-500 text-white px-2 py-1 rounded";
            }
        }

        // Expose function to window for button onclick
        window.generateApp = async function() {
            const prompt = document.getElementById("userPrompt").value;
            if (!prompt || !engine) return;

            runBtn.disabled = true;
            runBtn.innerText = "Generating...";
            
            try {
                // System prompt to force code generation
                const systemPrompt = `You are an expert web developer. Generate a single HTML file content based on the user request. 
                Use Tailwind CSS via CDN for styling (https://cdn.tailwindcss.com). 
                Output ONLY the code, no explanations. Start with <!DOCTYPE html>.`;

                const reply = await engine.chat.completions.create({
                    messages: [
                        { role: "system", content: systemPrompt },
                        { role: "user", content: prompt }
                    ],
                    temperature: 0.7,
                });

                const generatedCode = reply.choices[0].message.content;
                
                // Render code to iframe
                const frame = document.getElementById("workspaceFrame");
                frame.srcdoc = generatedCode;

            } catch (error) {
                alert("Error generating code: " + error.message);
            } finally {
                runBtn.disabled = false;
                runBtn.innerText = "Generate & Run (Free)";
            }
        };

        // Start AI Initialization
        initAI();
    </script>
</body>
</html>
